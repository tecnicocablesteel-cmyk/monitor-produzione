<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="60">
  <title>Ordini Produzione</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      background: #020617;
      border-bottom: 3px solid #22c55e;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 16px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .content {
      flex: 1;
      overflow: hidden;
    }

    iframe {
      border: none;
      width: 140vw;
      height: 100%;
      transform: scale(1.18);
      transform-origin: top left;
      background: white;
    }

    #fallback {
      display: none;
      text-align: center;
      padding-top: 40px;
      font-size: 24px;
    }

  </style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="title">ORDINI PRODUZIONE</div>

    <div class="header-right">
      <div class="status-dot"></div>
      <div id="countdown">Refresh tra 60s</div>
      <div id="clock"></div>
    </div>
  </div>

  <div class="content">

    <div id="fallback">
      Caricamento dati...
    </div>

    <iframe
      id="excelFrame"
      src="https://cablesteelgroup-my.sharepoint.com/personal/tecnico_cablesteel_it/_layouts/15/Doc.aspx?sourcedoc={cdb92c52-f8aa-4bf1-97f9-7e727736696d}&action=embedview&wdSheet=WEB&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True">
    </iframe>

  </div>

</div>

<script>
  // ORARIO
  function aggiornaClock() {
    const now = new Date();
    const ora = now.toLocaleTimeString("it-IT");
    document.getElementById("clock").textContent = ora;
  }

  // COUNTDOWN
  let secondi = 60;

  function aggiornaCountdown() {
    secondi--;

    if (secondi <= 0) secondi = 60;

    let testo = "Refresh tra " + secondi + "s";

    if (secondi <= 10) {
      testo += " ⚠️";
    }

    document.getElementById("countdown").textContent = testo;
  }

  // FALLBACK SAMSUNG
  setTimeout(function() {
    let iframe = document.getElementById("excelFrame");

    try {
      iframe.contentWindow.location.href;
    } catch(e) {
      document.getElementById("fallback").style.display = "block";
      window.location.href = iframe.src;
    }
  }, 3000);

  aggiornaClock();
  setInterval(aggiornaClock, 1000);
  setInterval(aggiornaCountdown, 1000);
</script>

</body>
</html>
